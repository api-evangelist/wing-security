aid: wing-security
name: Wing Security
description: >-
  Wing Security is an AI security platform providing automated discovery,
  risk assessment, and governance of AI agents, SaaS applications, and
  app-to-app integrations. The platform delivers SaaS Security Posture
  Management (SSPM), Identity Threat Detection and Response (ITDR), and
  continuous observability for AI tools across enterprise environments.
type: Index
